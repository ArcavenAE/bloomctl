id: elem-subdomain-chain
type: element
confidence: bedrock
title: "Subdomain chain — third val-resolution-chain instantiation (B4)"
content: |
  iru's server URL is templated (`https://{subdomain}.api.kandji.io`
  US / `.api.eu.kandji.io` EU). The tenant subdomain is constant for
  the life of a token — the abusive-argument test applies — but unlike
  sidestep's owner/customer it is a client-construction concern, not a
  path param. Resolution: `--subdomain` flag → BLOOMCTL_SUBDOMAIN →
  `[default] subdomain` config → chain-naming error. Region (us/eu)
  rides the same shape. Audit records provenance as
  `path_params_source._subdomain` (reserved name) so the mining signal
  stays uniform with sidestep's.

  Cross-repo: instantiates sidestep's bedrock `val-resolution-chain`
  (third instantiation; token and owner/customer chains are the first
  two). Token chain (env → keyring → config) inherited verbatim.
edges:

title: "progenitor codegen with iru pre-passes (B2)"
content: |
  `bloomctl-api` regenerates from `spec/iru-endpoint-openapi.json` via
  `cargo xtask regen` (progenitor 0.14). Three pre-passes:

  1. fill_missing_operation_ids — ALL 121 operations lack operationId
     (StepSecurity: 78/93). Synthesized `{method}_{path}` with the
     constant `/api/vN` prefix stripped (`get_devices`, not
     `get_api_v1_devices`). Zero collisions. Applied at sync-spec time
     so the vendored spec is self-contained.
  2. strip_multipart_request_bodies — NEW for iru. progenitor rejects
     multipart/form-data outright; iru's 3 library-upload endpoints
     carry it. In-memory only — vendored spec keeps them; SDK dispatch
     still sees has_body.
  3. collapse_multi_error_responses — 226 collapsed. Multi-success: 0.

  Output: ~500KB generated client, 121 operations, committed.

title: "Vendored spec, live source (B3)"
content: |
  Spec vendored under `spec/iru-endpoint-openapi.json` with a `.sha256`
  pin. `cargo xtask sync-spec` fetches from
  https://docs.iru.com/openapi/iru-endpoint-openapi.json, sanitizes
  secret-shaped examples, synthesizes operationIds, and updates both
  files. `diff-spec` remains a stub (inherited follow-on). Keeping up
  with vendor API changes is `sync-spec && regen && rebuild`.

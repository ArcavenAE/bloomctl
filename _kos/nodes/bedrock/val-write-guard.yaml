id: val-write-guard
type: value
confidence: bedrock
title: "Write-guard — read-only against production by default (B5)"
content: |
  Any non-GET operation errors with a repair-friendly WriteGuard
  message unless allowed by: --allow-write (per call) →
  BLOOMCTL_ALLOW_WRITE env → `[default] allow_writes = true` config.
  The same posture gates MCP tools/call for any tool not named
  get-*/list-*. Enforced in Client::call_op BEFORE request
  construction (wiremock expect(0) pins it); `auth status` reports the
  posture loudly.

  Rationale: the only live tenant is in-use production; the vendor's
  own MCP docs recommend explicit approval for destructive operations.
  Candidate for back-porting to sidestep and for the pattern library
  generally: any CLI whose only live target is production wants this.
edges:
  - target: elem-mcp-client-surface
    type: supports
    note: "the guard applies uniformly to REST and MCP calls"

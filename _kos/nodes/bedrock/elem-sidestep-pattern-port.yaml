type: element
confidence: bedrock
title: "The sidestep pattern transfers wholesale (B1)"
content: |
  bloomctl was scaffolded by porting sidestep's entire workspace
  (4 crates + xtask + tests + CI + rules) and re-instantiating only the
  vendor-specific ~30%: spec module, auth chains, kind table, enrich
  recipes, fixtures. The vendor-agnostic ~70% — stream contract, CEL
  adapter, audit machinery, redaction, keyring handling, wiremock
  harness, distribution workflows — transferred without redesign.
  Zero to 147 green tests (sidestep parity: 127) in one session.

  Cross-repo evidence: orc finding-077 (pattern-vs-implementation
  split); bears on orc F16 (assumption provenance) and F17 (lifecycle
  infrastructure).

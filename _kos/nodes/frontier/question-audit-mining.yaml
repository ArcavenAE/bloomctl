title: "Audit-trail mining → v0.2 composite verbs (F3)"
content: |
  The trail records REST and MCP calls in one stream. Which composite
  verbs do iru workflows want (fleet-health, enroll-audit,
  vuln-exposure)? Deferred until real usage accumulates — the explicit
  purpose of shipping the audit trail first. The mcp map crosswalk
  feeds this: the 96 tools with no direct REST-id twin mark surface
  worth examining. Threshold prior from sidestep (Murat): ~200
  distinct predicate_text values × ≥10 invocation contexts before
  sugar design is statistically defensible.

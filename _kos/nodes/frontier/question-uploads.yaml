id: question-uploads
type: question
confidence: frontier
title: "Library uploads (multipart) — curated verb or out of scope?"
content: |
  The three multipart upload endpoints (custom apps, in-house apps)
  are stripped from the generated client and not invocable via
  `bloomctl api` (JSON body only). If uploads matter, they arrive as
  a curated verb wrapping the documented S3 upload flow
  (upload-to-s3-openapi.json is a separate vendor spec). No demand
  signal yet.

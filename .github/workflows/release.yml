# Stable Release
# Triggers: tag push matching v*
# macOS arm64 only (CLI tool, mac-first per charter F6).
# Builds binary, signs, notarizes via zip submission, creates GitHub
# release, updates ArcavenAE/homebrew-tap.
name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@4305c38b25d97ef35a8ad1f985ccf2d2242004f2 # v1
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-targets
      - run: cargo test --workspace --doc --exclude bloomctl-api

  build:
    name: Build (aarch64-apple-darwin)
    needs: check
    runs-on: macos-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - uses: dtolnay/rust-toolchain@4305c38b25d97ef35a8ad1f985ccf2d2242004f2 # v1
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Build binary
        run: |
          cargo build --release --target aarch64-apple-darwin --bin bloomctl
          cp target/aarch64-apple-darwin/release/bloomctl bloomctl-darwin-arm64

      - name: Verify binary
        run: ./bloomctl-darwin-arm64 --version

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-bloomctl-darwin-arm64
          path: bloomctl-darwin-arm64

  sign-and-notarize:
    name: Sign & Notarize
    needs: build
    if: vars.SIGNING_ENABLED == 'true'
    permissions:
      contents: write
    environment: release
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Download binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries-bloomctl-darwin-arm64

      - name: Import certificates
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > cert.p12
          security import cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          rm cert.p12

          curl -sfo /tmp/DeveloperIDG2CA.cer https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          security add-certificates -k build.keychain /tmp/DeveloperIDG2CA.cer
          rm /tmp/DeveloperIDG2CA.cer

          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Sign binary
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            bloomctl-darwin-arm64

      - name: Verify signature
        run: codesign --verify --deep --strict bloomctl-darwin-arm64

      - name: Notarize binary (via zip submission)
        env:
          APPLE_NOTARIZATION_APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_NOTARIZATION_TEAM_ID: ${{ secrets.APPLE_NOTARIZATION_TEAM_ID }}
        run: |
          # notarytool requires a notarizable container; bare Mach-O binaries
          # can't be submitted directly. We submit a zip; stapling isn't
          # supported on zip (only .app/.dmg/.pkg) so Gatekeeper does an
          # online notarization check at first run for direct downloads.
          # Homebrew installs strip the quarantine bit, so brew users don't
          # see Gatekeeper prompts either way.
          ditto -c -k --keepParent bloomctl-darwin-arm64 bloomctl-darwin-arm64.zip
          xcrun notarytool submit bloomctl-darwin-arm64.zip \
            --apple-id "$APPLE_NOTARIZATION_APPLE_ID" \
            --password "$APPLE_NOTARIZATION_PASSWORD" \
            --team-id "$APPLE_NOTARIZATION_TEAM_ID" \
            --wait --timeout 14400
          rm -f bloomctl-darwin-arm64.zip

      - name: Upload signed artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signed-binaries-darwin-arm64
          path: bloomctl-darwin-arm64
          retention-days: 14

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain || true

  release:
    name: Create Release
    needs: [build, sign-and-notarize]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.sign-and-notarize.result == 'success' || needs.sign-and-notarize.result == 'skipped')
    permissions:
      contents: write
    environment: release
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Download binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.sign-and-notarize.result == 'success' && 'signed-binaries-darwin-arm64' || 'binaries-bloomctl-darwin-arm64' }}
          path: dist/

      - name: List release files
        run: ls -la dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TAG="${{ needs.build.outputs.tag }}"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "v${VERSION}" \
            --generate-notes \
            --notes "$(cat <<NOTES
          Install via Homebrew:
              brew install ArcavenAE/tap/bloomctl

          Or with mise (pulls this exact release, verifies GitHub attestations natively):
              mise use "github:ArcavenAE/bloomctl@${TAG}"
          NOTES
          )" \
            dist/*

  update-homebrew:
    name: Update Homebrew Tap
    needs: [build, sign-and-notarize, release]
    if: needs.release.result == 'success' && needs.sign-and-notarize.result == 'success'
    permissions:
      contents: write
    environment: release
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Download signed binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: signed-binaries-darwin-arm64
          path: dist/

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TAG="${{ needs.build.outputs.tag }}"

          SHA256_DARWIN_ARM64=$(shasum -a 256 dist/bloomctl-darwin-arm64 | cut -d' ' -f1)

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/ArcavenAE/homebrew-tap.git" homebrew-tap-repo
          cd homebrew-tap-repo

          mkdir -p Formula
          cp ../Formula/bloomctl.rb Formula/bloomctl.rb

          sed -i "s|VERSION_PLACEHOLDER|$VERSION|g" Formula/bloomctl.rb
          sed -i "s|TAG_PLACEHOLDER|$TAG|g" Formula/bloomctl.rb
          sed -i "s|SHA256_DARWIN_ARM64_PLACEHOLDER|$SHA256_DARWIN_ARM64|g" Formula/bloomctl.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/bloomctl.rb
          git diff --cached --quiet || git commit -m "Update bloomctl to v${VERSION}"
          git push

  attest:
    name: Attest Release Provenance
    needs: [build, sign-and-notarize, release]
    # Run after release (the last asset mutation) so attestations cover the
    # bytes that ship — the signed + notarized binary uploaded to the GitHub
    # release — not the pre-sign artifact.
    if: |
      !cancelled() &&
      needs.build.result == 'success' &&
      needs.release.result == 'success' &&
      (needs.sign-and-notarize.result == 'success' || needs.sign-and-notarize.result == 'skipped')
    permissions:
      contents: read
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Download final release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          # Pull everything currently attached to the release.
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${{ github.repository }}" \
            --dir release-assets
          echo "Assets to be attested:"
          ls -la release-assets/

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'release-assets/*'
